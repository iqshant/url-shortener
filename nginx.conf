events {
  worker_connections 1024;
}

http {
  upstream shortener_backend {
    # least_conn sends each request to the instance with the fewest active
    # connections, which balances load better than plain round robin when
    # request times vary (e.g. cache hit vs cache miss).
    least_conn;
    server app1:3000;
    server app2:3000;
    server app3:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://shortener_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
